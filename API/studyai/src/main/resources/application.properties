spring.application.name=studyai
logging.level.com.example.studyai=DEBUG
logging.level.org.springframework.boot=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.deprecation=ERROR

# Server Configuration


# Datasource configuration (loaded from environment or .env). Do NOT commit secrets into VCS.
# You can provide either a full JDBC URL via SPRING_DATASOURCE_URL or split values below.
spring.datasource.url=${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

# Connection Pool Configuration (HikariCP) - Optimized for Supabase PgBouncer
# CRITICAL: Single connection to avoid pooling conflicts with prepared statements
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=1200000
spring.datasource.hikari.max-lifetime=3600000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=180000
spring.datasource.hikari.data-source-properties.preparedStatementCacheSize=0
spring.datasource.hikari.data-source-properties.binaryTransfer=false
spring.datasource.hikari.data-source-properties.tcpKeepAlives=true

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Critical for PgBouncer (Supabase): Disable statement caching and batching
spring.jpa.properties.hibernate.jdbc.batch_size=1
spring.jpa.properties.hibernate.jdbc.statement_batch_size=0
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=false
spring.jpa.properties.hibernate.jdbc.use_streams_for_binary=false

# Key: Disable prepared statement caching at Hibernate level
spring.jpa.properties.hibernate.jdbc.statement_cache_size=0
spring.jpa.properties.hibernate.jdbc.statement_cache_mode=MANUAL

# Prevent connection reuse issues
spring.jpa.properties.hibernate.order_inserts=false
spring.jpa.properties.hibernate.order_updates=false
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=false

# Jackson configuration for Java 8 date/time types
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

# Reduce schema validation that creates prepared statements
spring.jpa.properties.hibernate.schema_validation.enabled=false
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=false

# Disable statistics to avoid extra prepared statements
spring.jpa.properties.hibernate.generate_statistics=false

# Connection and transaction settings
# Increased to 120s to allow FastAPI quiz generation (text extraction + LLM processing)
spring.transaction.default-timeout=120
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=false

# FastAPI Configuration
fastapi.url=${FASTAPI_URL:http://localhost:8000}

# JWT Configuration
app.jwtSecret=${JWT_SECRET:study-ai-secret-key-change-in-production-environment}
app.jwtExpirationMs=86400000

# CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}

# Firebase Configuration
firebase.database-url=${FIREBASE_DATABASE_URL:}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Multipart File Upload Configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true
