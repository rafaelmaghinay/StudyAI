spring.application.name=studyai
logging.level.root=INFO
logging.level.com.example.studyai=DEBUG
logging.level.org.springframework.boot=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.postgresql=DEBUG

# Database Configuration - Load from .env (Railway) or environment variables
# CRITICAL: .env values take priority. If SPRING_DATASOURCE_URL is in .env, it MUST be used
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

# Connection Pool Configuration (HikariCP)
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=1200000
spring.datasource.hikari.max-lifetime=3600000
spring.datasource.hikari.auto-commit=true

# JPA / Hibernate - Use PostgreSQL dialect by default
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# SQL initialization
spring.sql.init.mode=never
